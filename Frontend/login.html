<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>User Login</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <nav>
    <a href="index.html" class="active">Home</a>
    <a href="login.html">Login</a>
    <a href="signup.html">Sign Up</a>
    <a href="about_index.html">About</a>
  </nav>
  <div class="form-box" style="margin-top: 80px;">
    <h2>Login</h2>
    <form id="loginForm">
      <input type="email" id="email" placeholder="Email" required>
      <input type="password" id="password" placeholder="Password" required>
      <button type="submit" class="full-width">Login</button>
    </form>
    <p id="loginMessage"></p>
  </div>

  <script>
    document.addEventListener("DOMContentLoaded", () => {
      const form = document.getElementById("loginForm");
      form.addEventListener("submit", async (e) => {
        e.preventDefault();

        const email = document.getElementById("email").value;
        const password = document.getElementById("password").value;

        try {
          const res = await fetch("http://localhost:5000/api/auth/login", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ email, password })
          });

          const data = await res.json();
          if (data.token) {
            localStorage.setItem("token", data.token);
            localStorage.setItem("role", data.role);
            document.getElementById("loginMessage").innerText = "✅ Login successful!";
            window.location.href = "dashboard.html"; // redirect to dashboard
          } else {
            document.getElementById("loginMessage").innerText = "❌ Login failed!";
          }
        } catch (err) {
          document.getElementById("loginMessage").innerText = "⚠️ Error connecting to server";
        }
      });
    });
  </script>
</body>
</html>
