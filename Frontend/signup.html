<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Signup</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <nav>
    <a href="index.html" class="active">Home</a>
    <a href="login.html">Login</a>
    <a href="signup.html">Sign Up</a>
    <a href="about_index.html">About</a>
  </nav>
  
  <div class="form-box" style="margin-top: 80px;">
    <h2>Register</h2>
    <form id="signupForm">
      <input type="text" id="name" placeholder="Name" required />
      <input type="email" id="email" placeholder="Email" required />
      <input type="password" id="password" placeholder="Password" required />
      <button type="submit" class="full-width">Register</button>
    </form>
    <p id="signupMessage"></p>
  </div>

 <script>
    document.getElementById("signupForm").addEventListener("submit", async (e) => {
        e.preventDefault();

        try {
        const res = await fetch("http://localhost:5000/api/auth/register", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({
            name: document.getElementById("name").value,
            email: document.getElementById("email").value,
            password: document.getElementById("password").value,
            role: "user" // or "admin"
            })
        });

        const data = await res.json();

        if (res.ok) {
            // Show message
            document.getElementById("signupMessage").innerText = data.message || "✅ Registration complete!";
            
            // Optionally store token/role if your API returns them
            if (data.token) {
            localStorage.setItem("token", data.token);
            localStorage.setItem("role", data.role || "user");
            }

            // Redirect to dashboard
            window.location.href = "dashboard.html";
        } else {
            document.getElementById("signupMessage").innerText = data.message || "❌ Registration failed!";
        }
        } catch (err) {
        document.getElementById("signupMessage").innerText = "⚠️ Error connecting to server";
        }
      });
    </script>
</body>
</html>
